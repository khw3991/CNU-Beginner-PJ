<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMovie - 가까운 상영관 찾기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <header>
        <h1 id="logo">🎬 QuickMovie</h1>
    </header>

    <main id="app">
        <section id="main-page" class="page">
            <div class="main-top">
                <div id="mini-map-container">
                    <div id="map"></div> </div>
                <div class="popular-section">
                    <h2>현재 인기 영화 TOP 5</h2>
                    <div id="popular-list" class="movie-row">
                        </div>
                </div>
            </div>
            <div class="search-section">
                <input type="text" id="search-input" placeholder="보고 싶은 영화를 검색하세요...">
                <button id="search-btn">검색</button>
            </div>
        </section>

        <section id="search-page" class="page hidden">
            <div class="search-controls">
                <div class="date-picker">
                    <span>날짜</span>
                    <button class="date-btn">7</button>
                    <button class="date-btn">8</button>
                    <button class="date-btn active">9</button>
                    <button class="date-btn">10</button>
                    <button class="date-btn">11</button>
                    <button class="date-btn">12</button>
                </div>

                <div class="time-range-section">
                    <label>시간 범위 조절</label>
                    <div class="dual-range-container">
                        <!-- 시작 시간 조절 -->
                        <input type="range" id="time-min" min="0" max="24" value="9" step="1">
                        <!-- 종료 시간 조절 -->
                        <input type="range" id="time-max" min="0" max="24" value="21" step="1">
        
                        <!-- 선택된 범위를 시각적으로 보여줄 막대 -->
                        <div class="slider-track"></div>
                    </div>
                    <div class="time-labels">
                        <span id="min-label">09:00</span>
                        <span>~</span>
                        <span id="max-label">21:00</span>
                    </div>
                </div
            

                <!-- 3. 검색 결과 리스트 (거리순) -->
                <div class="results-container">
                    <span id="search-title">검색 결과 (거리순 ↓)</span>
                    <div id="search-results" class="movie-grid">
                        <!-- 여기에 script.js가 영화 정보를 채워줄 거예요 -->
                    </div>
                </div>
        </section>

        <section id="detail-page" class="page hidden">
            <div class="detail-container">
                <div class="detail-left">
                    <img id="detail-poster" src="" alt="포스터">
                </div>
                <div class="detail-right">
                    <h1 id="detail-title">영화 제목</h1>
                    <div class="filter-options">
                        <span>거리 설정: </span>
                        <button class="dist-opt" data-dist="1">1km</button>
                        <button class="dist-opt active" data-dist="3">3km</button>
                        <button class="dist-opt" data-dist="5">5km</button>
                        <button class="dist-opt" data-dist="7">7km</button>
                    </div>
                    <div id="theater-list">
                        </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
